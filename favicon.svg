<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#caeadc"/>
      <stop offset="100%" style="stop-color:#bcdbce"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48655a"/>
      <stop offset="100%" style="stop-color:#3d594f"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Letter A — geometric, Sora-style, slightly condensed -->
  <text
    x="32"
    y="46"
    text-anchor="middle"
    font-family="Sora, sans-serif"
    font-weight="600"
    font-size="38"
    letter-spacing="-1"
    fill="url(#letter)"
  >A</text>
</svg>
